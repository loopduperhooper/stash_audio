# Refer to https://gqlgen.com/config/ for detailed .gqlgen.yml documentation.

schema:
  - "graphql/schema/types/*.graphql"
  - "graphql/schema/*.graphql"
exec:
  filename: internal/api/generated_exec.go
model:
  filename: internal/api/generated_models.go

struct_tag: gqlgen

autobind:
  - github.com/stashapp/stash_audio/internal/api
  - github.com/stashapp/stash_audio/pkg/models
  - github.com/stashapp/stash_audio/pkg/plugin

models:
  # Scalars
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.IntID
      - github.com/stashapp/stash_audio/pkg/models.FileID
      - github.com/stashapp/stash_audio/pkg/models.FolderID
  Int64:
    model: github.com/99designs/gqlgen/graphql.Int64
  Timestamp:
    model: github.com/stashapp/stash_audio/internal/api.Timestamp
  BoolMap:
    model: github.com/stashapp/stash_audio/internal/api.BoolMap
  PluginConfigMap:
    model: github.com/stashapp/stash_audio/internal/api.PluginConfigMap
  File:
    model: github.com/stashapp/stash_audio/internal/api.File
  VideoFile:
    fields:
      # override float fields - #1572
      duration:
        fieldName: DurationFinite
      frame_rate:
        fieldName: FrameRateFinite
  AudioFile:
    fields:
      # override float fields
      duration:
        fieldName: DurationFinite
      bit_rate:
        fieldName: BitRate
  # movie is group under the hood
  Movie:
    model: github.com/stashapp/stash_audio/pkg/models.Group
  MovieFilterType:
    model: github.com/stashapp/stash_audio/pkg/models.GroupFilterType
  # autobind on config causes generation issues
  BlobsStorageType:
    model: github.com/stashapp/stash_audio/internal/manager/config.BlobsStorageType
  StashConfig:
    model: github.com/stashapp/stash_audio/internal/manager/config.StashConfig
  StashConfigInput:
    model: github.com/stashapp/stash_audio/internal/manager/config.StashConfigInput
  StashBoxInput:
    model: github.com/stashapp/stash_audio/internal/manager/config.StashBoxInput
  ConfigImageLightboxResult:
    model: github.com/stashapp/stash_audio/internal/manager/config.ConfigImageLightboxResult
  ImageLightboxDisplayMode:
    model: github.com/stashapp/stash_audio/internal/manager/config.ImageLightboxDisplayMode
  ImageLightboxScrollMode:
    model: github.com/stashapp/stash_audio/internal/manager/config.ImageLightboxScrollMode
  ConfigDisableDropdownCreate:
    model: github.com/stashapp/stash_audio/internal/manager/config.ConfigDisableDropdownCreate
  ScanMetadataOptions:
    model:  github.com/stashapp/stash_audio/internal/manager/config.ScanMetadataOptions
  CleanGeneratedInput:
    model: github.com/stashapp/stash_audio/internal/manager/task.CleanGeneratedOptions
  AutoTagMetadataOptions:
    model: github.com/stashapp/stash_audio/internal/manager/config.AutoTagMetadataOptions
  SystemStatus:
    model: github.com/stashapp/stash_audio/internal/manager.SystemStatus
  SystemStatusEnum:
    model: github.com/stashapp/stash_audio/internal/manager.SystemStatusEnum
  ImportDuplicateEnum:
    model: github.com/stashapp/stash_audio/internal/manager.ImportDuplicateEnum
  SetupInput:
    model: github.com/stashapp/stash_audio/internal/manager.SetupInput
  MigrateInput:
    model: github.com/stashapp/stash_audio/internal/manager.MigrateInput
  ScanMetadataInput:
    model: github.com/stashapp/stash_audio/internal/manager.ScanMetadataInput
  AutoTagMetadataInput:
    model: github.com/stashapp/stash_audio/internal/manager.AutoTagMetadataInput
  CleanMetadataInput:
    model: github.com/stashapp/stash_audio/internal/manager.CleanMetadataInput
  ExportObjectTypeInput:
    model: github.com/stashapp/stash_audio/internal/manager.ExportObjectTypeInput
  ExportObjectsInput:
    model: github.com/stashapp/stash_audio/internal/manager.ExportObjectsInput
  ImportObjectsInput:
    model: github.com/stashapp/stash_audio/internal/manager.ImportObjectsInput
  ScanMetaDataFilterInput:
    model: github.com/stashapp/stash_audio/internal/manager.ScanMetaDataFilterInput
  # renamed types
  BulkUpdateIdMode:
    model: github.com/stashapp/stash_audio/pkg/models.RelationshipUpdateMode
  SavedFindFilterType:
    model: github.com/stashapp/stash_audio/pkg/models.FindFilterType
  # force resolvers
  ConfigResult:
    fields:
      plugins:
        resolver: true
  Performer:
    fields:
      career_length:
        resolver: true
  
