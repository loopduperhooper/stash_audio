enum SortDirectionEnum {
  ASC
  DESC
}

input FindFilterType {
  q: String
  page: Int
  "use per_page = -1 to indicate all results. Defaults to 25."
  per_page: Int
  # TODO - this should be refactored to not use a string
  sort: String
  direction: SortDirectionEnum
}

type SavedFindFilterType {
  q: String
  page: Int
  """
  use per_page = -1 to indicate all results. Defaults to 25.
  """
  per_page: Int
  sort: String
  direction: SortDirectionEnum
}

input FileDuplicationCriterionInput {
  duplicated: Boolean @deprecated(reason: "Use phash field instead")
  "Currently unimplemented. Intended for phash distance matching."
  distance: Int
  "Filter by phash duplication"
  phash: Boolean
}

input StashIDCriterionInput {
  """
  If present, this value is treated as a predicate.
  That is, it will filter based on stash_id with the matching endpoint
  """
  endpoint: String
  stash_id: String
  modifier: CriterionModifier!
}

input StashIDsCriterionInput {
  """
  If present, this value is treated as a predicate.
  That is, it will filter based on stash_ids with the matching endpoint
  """
  endpoint: String
  stash_ids: [String]
  modifier: CriterionModifier!
}

input CustomFieldCriterionInput {
  field: String!
  value: [Any!]
  modifier: CriterionModifier!
}

input PerformerFilterType {
  AND: PerformerFilterType
  OR: PerformerFilterType
  NOT: PerformerFilterType

  name: StringCriterionInput
  disambiguation: StringCriterionInput
  details: StringCriterionInput

  "Filter by favorite"
  filter_favorites: Boolean
  "Filter by birth year"
  birth_year: IntCriterionInput
  "Filter by age"
  age: IntCriterionInput
  "Filter by ethnicity"
  ethnicity: StringCriterionInput
  "Filter by country"
  country: StringCriterionInput
  "Filter by eye color"
  eye_color: StringCriterionInput
  "Filter by height in cm"
  height_cm: IntCriterionInput
  "Filter by measurements"
  measurements: StringCriterionInput
  "Filter by fake tits value"
  fake_tits: StringCriterionInput
  "Filter by penis length value"
  penis_length: FloatCriterionInput
  "Filter by ciricumcision"
  circumcised: CircumcisionCriterionInput
  "Deprecated: use career_start and career_end. This filter is non-functional."
  career_length: StringCriterionInput
    @deprecated(reason: "Use career_start and career_end")
  "Filter by career start year"
  career_start: IntCriterionInput
  "Filter by career end year"
  career_end: IntCriterionInput
  "Filter by tattoos"
  tattoos: StringCriterionInput
  "Filter by piercings"
  piercings: StringCriterionInput
  "Filter by aliases"
  aliases: StringCriterionInput
  "Filter by gender"
  gender: GenderCriterionInput
  "Filter to only include performers missing this property"
  is_missing: String
  "Filter to only include performers with these tags"
  tags: HierarchicalMultiCriterionInput
  "Filter by tag count"
  tag_count: IntCriterionInput
  "Filter by audio count"
  audio_count: IntCriterionInput
  "Filter by group count"
  group_count: IntCriterionInput
  "Filter by StashID"
  stash_id_endpoint: StashIDCriterionInput
    @deprecated(reason: "use stash_ids_endpoint instead")
  "Filter by StashIDs"
  stash_ids_endpoint: StashIDsCriterionInput
  # rating expressed as 1-100
  rating100: IntCriterionInput
  "Filter by url"
  url: StringCriterionInput
  "Filter by hair color"
  hair_color: StringCriterionInput
  "Filter by weight"
  weight: IntCriterionInput
  "Filter by death year"
  death_year: IntCriterionInput
  "Filter by studios where performer appears in audio"
  studios: HierarchicalMultiCriterionInput
  "Filter by groups the performer belongs to"
  groups: HierarchicalMultiCriterionInput
  "Filter by performers who appear together in audio"
  performers: MultiCriterionInput
  "Filter by autotag ignore value"
  ignore_auto_tag: Boolean
  "Filter by birthdate"
  birthdate: DateCriterionInput
  "Filter by death date"
  death_date: DateCriterionInput
  "Filter by related tags that meet this criteria"
  tags_filter: TagFilterType
  "Filter by creation time"
  created_at: TimestampCriterionInput
  "Filter by last update time"
  updated_at: TimestampCriterionInput

  custom_fields: [CustomFieldCriterionInput!]
}

input MovieFilterType {
  AND: MovieFilterType
  OR: MovieFilterType
  NOT: MovieFilterType

  name: StringCriterionInput
  director: StringCriterionInput
  synopsis: StringCriterionInput

  "Filter by duration (in seconds)"
