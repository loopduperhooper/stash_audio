query Stats {
  stats {
    audio_count
    audios_size
    audios_duration
    performer_count
    studio_count
    group_count
    tag_count
  }
}

query Logs {
  logs {
    ...LogEntryData
  }
}
query Version {
  version {
    version
    hash
    build_time
  }
}

query LatestVersion {
  latestversion {
    version
    shorthash
    release_date
    url
  }
}
