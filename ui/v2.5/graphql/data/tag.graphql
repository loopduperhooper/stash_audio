fragment TagData on Tag {
  id
  name
  sort_name
  description
  aliases
  ignore_auto_tag
  favorite
  stash_ids {
    endpoint
    stash_id
    updated_at
  }
  image_path
  audio_count
  audio_count_all: audio_count(depth: -1)
  performer_count
  performer_count_all: performer_count(depth: -1)
  studio_count
  studio_count_all: studio_count(depth: -1)
  group_count
  group_count_all: group_count(depth: -1)

  parents {
    ...SlimTagData
  }

  children {
    ...SlimTagData
  }

  custom_fields
}

fragment SelectTagData on Tag {
  id
  name
  sort_name
  favorite
  description
  aliases
  image_path

  parents {
    id
    name
    sort_name
  }

  stash_ids {
    endpoint
    stash_id
    updated_at
  }
}

fragment TagListData on Tag {
  id
  name
  sort_name
  description
  aliases
  ignore_auto_tag
  favorite
  stash_ids {
    endpoint
    stash_id
    updated_at
  }
  image_path
  audio_count
  performer_count
  studio_count
  group_count

  parents {
    ...SlimTagData
  }

  children {
    ...SlimTagData
  }
}
