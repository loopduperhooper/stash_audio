fragment GroupData on Group {
  id
  name
  aliases
  duration
  date
  rating100
  director

  studio {
    ...SlimStudioData
  }

  tags {
    ...SlimTagData
  }

  containing_groups {
    group {
      ...SlimGroupData
    }
    description
  }

  synopsis
  urls
  front_image_path
  back_image_path
  audio_count
  performer_count
  performer_count_all: performer_count(depth: -1)
  sub_group_count
  sub_group_count_all: sub_group_count(depth: -1)

  performers {
    ...SlimPerformerData
  }

  audios {
    ...SlimAudioData
  }

  audios {
    ...SlimAudioData
  }

  custom_fields
}

fragment ListGroupData on Group {
  id
  name
  aliases
  duration
  date
  rating100
  director

  studio {
    ...SlimStudioData
  }

  tags {
    ...SlimTagData
  }

  containing_groups {
    group {
      ...SlimGroupData
    }
    description
  }

  synopsis
  urls
  front_image_path
  back_image_path
  audio_count
  performer_count
  sub_group_count

  audios {
    ...SlimAudioData
  }

  audios {
    ...SlimAudioData
  }
}
